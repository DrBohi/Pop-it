<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Special Ball Preview</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        display: grid;
        place-items: center;
        min-height: 100vh;
      }

      .preview-page {
        display: grid;
        gap: 22px;
        width: min(900px, calc(100vw - 40px));
      }

      .preview-title {
        margin: 0;
        font-size: 2rem;
        text-align: center;
      }

      #gameCanvas {
        width: 100%;
        height: 300px;
        border: 1px solid #e4e8ee;
        border-radius: 8px;
      }

      .preview-labels {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
        color: #485467;
        font-weight: 850;
        text-align: center;
      }

      .hidden-game-ui {
        display: none;
      }
    </style>
  </head>
  <body>
    <main class="preview-page">
      <h1 class="preview-title">Special Ball Preview</h1>
      <canvas id="gameCanvas" aria-label="Special ball preview"></canvas>
      <div class="preview-labels">
        <span>Gold</span>
        <span>Freeze</span>
        <span>Bomb</span>
        <span>Hazard</span>
      </div>
    </main>

    <div class="hidden-game-ui">
      <span id="timeValue">0:00</span>
      <span id="scoreValue">0</span>
      <span id="livesValue">3</span>
      <span id="comboValue">0x</span>
      <div id="startOverlay"></div>
      <div id="countdown"></div>
      <div id="countdownValue">3</div>
      <div class="score-display"></div>
      <div class="play-wrap"></div>
      <div id="streakToast"></div>
      <div id="streakValue"></div>
      <div id="goalScore"></div>
      <div id="goalCombo"></div>
      <div id="goalGold"></div>
      <div id="resultLine"></div>
      <button id="startButton" type="button"></button>
      <button class="difficulty-button" data-difficulty="easy" type="button"></button>
    </div>

    <script src="game.js"></script>
    <script>
      function renderPreview() {
        resizeCanvas();
        drawBackground();

        const previewTypes = ["gold", "freeze", "bomb", "danger"];
        const previewBalls = previewTypes.map((type, index) => ({
          type,
          color: specialColor(type),
          x: (canvas.clientWidth / 5) * (index + 1),
        }));

        previewBalls.forEach((ball, index) => {
          drawCircle({
            ...ball,
            y: 150,
            radius: 58,
            baseRadius: 58,
            minRadius: 12,
            shrinkPerSecond: 0,
            createdAt: 0,
            seed: 50 + index * 19,
          });
        });
      }

      renderPreview();
      iceTexture.addEventListener("load", renderPreview);
      window.addEventListener("resize", renderPreview);
      window.setTimeout(renderPreview, 400);
    </script>
  </body>
</html>
